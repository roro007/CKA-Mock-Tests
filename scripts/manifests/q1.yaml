apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: production
data:
  config.yaml: |
    database_host: postgres.production.svc.cluster.local
---
apiVersion: v1
kind: Pod
metadata:
  name: app-frontend
  namespace: production
spec:
  containers:
  - name: app
    image: nginx
    volumeMounts:
    - name: config
      mountPath: /etc/app/config.yaml
      subPath: config.yaml
  volumes:
  - name: config
    configMap:
      name: app-config