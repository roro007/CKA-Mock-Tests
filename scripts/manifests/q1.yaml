apiVersion: v1
kind: Pod
metadata:
  name: app-frontend
  namespace: production
  labels:
    app: app-frontend
spec:
  restartPolicy: Always
  containers:
  - name: frontend
    image: busybox:1.36
    command:
    - /bin/sh
    - -c
    - |
      echo "Starting frontend application"
      if [ ! -f /etc/app/config.yaml ]; then
        echo "ERROR: Missing /etc/app/config.yaml"
        exit 1
      fi
      echo "Configuration loaded"
      cat /etc/app/config.yaml
      sleep 3600