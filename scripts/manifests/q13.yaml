apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-hog
  namespace: test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resource-hog
  template:
    metadata:
      labels:
        app: resource-hog
    spec:
      containers:
      - name: workload
        image: nginx:1.29
        resources:
          requests:
            cpu: 1
            memory: 2Gi
          limits:
            cpu: 2
            memory: 4Gi