apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: staging-reader
  namespace: staging
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: staging-reader-binding
  namespace: staging
subjects:
- kind: User
  name: dev-user
roleRef:
  kind: Role
  name: staging-reader
  apiGroup: rbac.authorization.k8s.io