apiVersion: v1
kind: Pod
metadata:
  name: app-frontend
  namespace: production
  labels:
    app: app-frontend
spec:
  restartPolicy: Always
  containers:
  - name: frontend
    image: busybox:1.36
    command:
    - sh
    - -c
    - |
      echo "Starting application..."
      cat /etc/app/config.yaml
      echo "Application Started"
      sleep 3600